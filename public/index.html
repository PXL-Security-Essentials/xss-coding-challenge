<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    input { display: block; margin: 8px 0; padding: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
    button { margin-top: 8px; padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; font-size: 14px; border-radius: 4px; }
    button:hover { background: #0056b3; }
    a { color: #007bff; }
  </style>
</head>
<body>
  <h1>📝 Guestbook</h1>
  <p>Leave a comment below!</p>

  <form action="/comment" method="POST">
    <label>Your name:</label>
    <input type="text" name="name" placeholder="e.g. Alice" required />

    <label>Your message:</label>
    <input type="text" name="message" placeholder="e.g. Hello world!" required />

    <button type="submit">Post Comment</button>
  </form>

  <hr />
  <a href="/comments">💬 View all comments</a>
</body>
</html>
